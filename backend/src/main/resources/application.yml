spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sidequest}
    username: ${DB_USERNAME:sidequest_user}
    password: ${DB_PASSWORD:sidequest_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # Automatically creates/updates your database tables
    show-sql: true # Helpful for debugging
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  google:
    client-id: ${GOOGLE_CLIENT_ID}